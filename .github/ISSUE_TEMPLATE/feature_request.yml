name: ✨ Feature request
description: 提一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题 / Problem
      description: 在什么场景下你遇到了不便?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposed solution
      placeholder: 如果有具体的实现思路,欢迎一起写在这里
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案 / Alternatives considered
